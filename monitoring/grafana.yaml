# =============================================================
# Grafana Deployment
# - Connects to Prometheus as data source
# - Pre-configured with node exhaustion dashboard
#   (node_memory_MemAvailable_bytes, OOMKill tracking)
# =============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: elk-siem
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        access: proxy
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: elk-siem
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'homelab'
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---
# Node Exhaustion Dashboard (JSON model)
# Tracks: memory, CPU, OOMKills — the three signals discussed in the interview
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-node
  namespace: elk-siem
data:
  node-exhaustion.json: |
    {
      "title": "Node Exhaustion Monitor",
      "uid": "node-exhaustion",
      "schemaVersion": 38,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Available Memory % (node_memory_MemAvailable_bytes)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100",
              "legendFormat": "Available Memory % - {{instance}}",
              "refId": "A"
            }
          ],
          "thresholds": {
            "steps": [
              { "color": "green", "value": null },
              { "color": "yellow", "value": 20 },
              { "color": "red", "value": 10 }
            ]
          },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 20 },
                  { "color": "green", "value": 40 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "CPU Usage % (idle inverted)",
          "type": "gauge",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)",
              "legendFormat": "CPU % - {{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          }
        },
        {
          "id": 3,
          "title": "Pod Restarts (OOMKill indicator)",
          "description": "Sudden restart = likely OOMKill. Correlate with memory graph.",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "increase(kube_pod_container_status_restarts_total[5m])",
              "legendFormat": "{{pod}} / {{container}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "title": "Disk Available %",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "(node_filesystem_avail_bytes{mountpoint='/'} / node_filesystem_size_bytes{mountpoint='/'}) * 100",
              "legendFormat": "Disk Available % - {{instance}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "percent", "min": 0, "max": 100 }
          }
        }
      ]
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: elk-siem
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.2.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "homelab123"         # Change this in production
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
              value: "/var/lib/grafana/dashboards/node-exhaustion.json"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-node
              mountPath: /var/lib/grafana/dashboards
            - name: grafana-data
              mountPath: /var/lib/grafana

      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards-config
        - name: dashboard-node
          configMap:
            name: grafana-dashboard-node
        - name: grafana-data
          emptyDir: {}    # Replace with PVC for persistent dashboard storage

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: elk-siem
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort    # Access at http://<node-ip>:30300
