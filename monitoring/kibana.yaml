# =============================================================
# Kibana Deployment
# - Connects to Elasticsearch via ClusterIP service
# - Exposed via NodePort for homelab browser access
# =============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: elk-siem
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.11.0
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch-svc:9200"   # Points to ClusterIP service
            - name: SERVER_NAME
              value: "kibana-homelab"
            - name: XPACK_SECURITY_ENABLED
              value: "false"                           # Match ES security setting
            - name: SERVER_PUBLICBASEURL
              value: "http://localhost:5601"
          ports:
            - containerPort: 5601
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: elk-siem
  labels:
    app: kibana
spec:
  selector:
    app: kibana
  ports:
    - name: http
      port: 5601
      targetPort: 5601
      nodePort: 30601    # Access at http://<node-ip>:30601 from your browser
  type: NodePort
