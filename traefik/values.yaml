service:
  type: LoadBalancer
  loadBalancerIP: "192.168.12.200"

ingressClass:
  enabled: true
  isDefaultClass: true

ports:
  web:
    port: 8000
    exposedPort: 80
    expose:
      default: true
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    port: 8443
    exposedPort: 443
    expose:
      default: true
    # http.tls is enabled by default — no need to add anything here
    # http:
    #   middlewares:
    #   - auth@kubernetescrd
